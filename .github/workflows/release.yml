name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built distributions to PyPI.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.21"
          enable-cache: false

      - name: Install dependencies
        run: uv sync --locked

      - name: Build, validate, smoke-test, and generate SBOM
        run: make build

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmatrix-release-dist
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.cdx.json
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish to PyPI
    if: (github.event_name == 'release' || inputs.publish == 'true') && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/benchmatrix/

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          name: benchmatrix-release-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
