name: Draft release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: draft-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft:
    name: Create draft GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate release metadata and notes
        id: release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python scripts/prepare_release.py validate "$version"
          python scripts/prepare_release.py notes "$version" --output release-notes.md
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create or update draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Release ${GITHUB_REF_NAME}"
          if gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft > release-state.txt 2>/dev/null; then
            if grep -qx true release-state.txt; then
              gh release edit "$GITHUB_REF_NAME" --draft --title "$title" --notes-file release-notes.md
            else
              echo "Release ${GITHUB_REF_NAME} already exists and is not a draft; leaving it unchanged."
            fi
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --draft --title "$title" --notes-file release-notes.md
          fi
