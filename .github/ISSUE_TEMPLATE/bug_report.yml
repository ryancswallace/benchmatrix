name: Bug report
description: Report reproducible incorrect behavior in benchmatrix
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security vulnerabilities, follow SECURITY.md instead of filing a public issue.
  - type: input
    id: version
    attributes:
      label: benchmatrix version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.14.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include the smallest code sample and command that reproduce the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output or traceback
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include relevant operating system, dependency versions, or benchmark JSON details.
