name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run full validation
        run: make check

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@v7
        with:
          name: benchmatrix-sbom
          path: dist/benchmatrix.cdx.json
          if-no-files-found: error
          retention-days: 30

  compatibility:
    name: Python ${{ matrix.python-version }}
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: make test

  dependency-audit:
    name: Dependency audit
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Audit dependencies
        run: make audit
