name: Release verification

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Version to verify, with or without a leading v.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-verify-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  verify-pypi:
    name: Verify PyPI install
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Resolve release version
        id: version
        shell: bash
        env:
          RELEASE_REF: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          release_ref="${RELEASE_REF}"
          case "$release_ref" in
            v*) version="${release_ref#v}" ;;
            *)
              echo "Release verification only runs for v* tags or v* manual inputs; got '${release_ref}'."
              echo "should_verify=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "should_verify=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.version.outputs.should_verify == 'true'
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        if: steps.version.outputs.should_verify == 'true'
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.21"
          enable-cache: false

      - name: Verify package installation from PyPI
        if: steps.version.outputs.should_verify == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          verify_env="$(mktemp -d)"
          trap 'rm -rf "$verify_env"' EXIT
          uv venv --quiet "$verify_env"
          for attempt in $(seq 1 20); do
            if VIRTUAL_ENV="$verify_env" uv pip install --quiet "benchmatrix==$VERSION"; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              echo "Failed to install benchmatrix==$VERSION from PyPI after $attempt attempts."
              exit 1
            fi
            sleep 30
          done
          "$verify_env/bin/python" -c "from benchmatrix import BenchmarkCase; print(BenchmarkCase.__name__)"
