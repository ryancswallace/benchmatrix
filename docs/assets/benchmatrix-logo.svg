<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 920 240">
  <!-- cspell:ignore linecap tspan -->
  <title>benchmatrix</title>
  <defs>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="0.56" stop-color="#12313a" />
      <stop offset="1" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="mark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5eead4" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="14" flood-color="#020617" flood-opacity="0.22" stdDeviation="16" />
    </filter>
  </defs>

  <rect width="920" height="240" rx="40" fill="#f8fafc" />
  <rect x="20" y="20" width="880" height="200" rx="32" fill="url(#card)" filter="url(#shadow)" />

  <g transform="translate(70 56)">
    <rect x="0" y="0" width="128" height="128" rx="28" fill="#ffffff" fill-opacity="0.08" />
    <path
      d="M24 92C38 92 38 42 52 42C66 42 66 106 80 106C94 106 94 64 108 64"
      fill="none"
      stroke="#5eead4"
      stroke-linecap="round"
      stroke-width="10"
    />
    <g fill="url(#mark)">
      <rect x="24" y="22" width="18" height="18" rx="6" />
      <rect x="55" y="22" width="18" height="18" rx="6" opacity="0.86" />
      <rect x="86" y="22" width="18" height="18" rx="6" opacity="0.72" />
      <rect x="24" y="55" width="18" height="18" rx="6" opacity="0.72" />
      <rect x="55" y="55" width="18" height="18" rx="6" opacity="0.92" />
      <rect x="86" y="55" width="18" height="18" rx="6" />
      <rect x="24" y="88" width="18" height="18" rx="6" opacity="0.92" />
      <rect x="55" y="88" width="18" height="18" rx="6" />
      <rect x="86" y="88" width="18" height="18" rx="6" opacity="0.86" />
