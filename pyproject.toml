[project]
name = "benchkit"
version = "0.1.0"
description = "Generic utilities for defining function latency benchmarking matrices."
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "pytest",
    "pytest-benchmark",
]

[dependency-groups]
dev = [
    "basedpyright>=1.39.8",
    "build>=1.5.0",
    "numpy>=2.2.6",
    "pre-commit>=4.6.0",
    "pytest",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=7.1.0",
    "ruff",
    "twine>=6.2.0",
]

[tool.uv]
link-mode = "copy"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/benchkit"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "--cov=benchkit",
    "--cov-report=term-missing",
    "--cov-fail-under=95",
]

[tool.coverage.run]
branch = true
source = ["benchkit"]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.format]
line-ending = "lf"
